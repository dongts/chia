services:
  # -------------------------------------------------------------------------
  # Caddy — reverse proxy with automatic HTTPS via Let's Encrypt
  # -------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      API_DOMAIN: ${API_DOMAIN:?Set API_DOMAIN in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

  # -------------------------------------------------------------------------
  # PostgreSQL — comment out if using an external database
  # -------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-chia}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chia}
      POSTGRES_DB: ${DB_NAME:-chia}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-chia}"]
      interval: 2s
      timeout: 5s
      retries: 10

  # -------------------------------------------------------------------------
  # Backend API
  # -------------------------------------------------------------------------
  backend:
    build: ./backend
    restart: unless-stopped
    # No ports exposed — Caddy proxies to backend:8000 internally
    environment:
      CHIA_DATABASE_URL: ${DATABASE_URL:-}
      DB_USER: ${DB_USER:-chia}
      DB_PASSWORD: ${DB_PASSWORD:-chia}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-chia}
      USE_CONNECTION_POOLER: ${USE_CONNECTION_POOLER:-false}
      CHIA_JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      CHIA_CORS_ORIGINS: '["${FRONTEND_URL:-http://localhost:5173}"]'
      CHIA_SUPERADMIN_EMAILS: ${CHIA_SUPERADMIN_EMAILS:-'[]'}
      CHIA_SENTRY_DSN: ${SENTRY_DSN:-}
      CHIA_ENV: ${CHIA_ENV:-production}
      CHIA_UPLOAD_DIR: /data/uploads
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/data/uploads

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:
