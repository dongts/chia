# Development docker-compose — hot reload, exposed ports
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chia
      POSTGRES_PASSWORD: chia
      POSTGRES_DB: chia
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chia"]
      interval: 2s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DB_USER: chia
      DB_PASSWORD: chia
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: chia
      CHIA_JWT_SECRET: dev-secret
      CHIA_CORS_ORIGINS: '["http://localhost:5173"]'
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploads:/app/uploads

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
