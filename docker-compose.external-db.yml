# Use when connecting to an external database (Supabase, RDS, etc.)
# Set DATABASE_URL in .env and run:
#   docker compose -f docker-compose.external-db.yml up -d

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      API_DOMAIN: ${API_DOMAIN:?Set API_DOMAIN in .env}
      MCP_DOMAIN: ${MCP_DOMAIN:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - mcp

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      CHIA_DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      USE_CONNECTION_POOLER: ${USE_CONNECTION_POOLER:-false}
      CHIA_JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      CHIA_CORS_ORIGINS: '["${FRONTEND_URL:-http://localhost:5173}"]'
      CHIA_UPLOAD_DIR: /data/uploads
    volumes:
      - uploads:/data/uploads

  mcp:
    build:
      context: ./backend
      dockerfile: Dockerfile.mcp
    restart: unless-stopped
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_PORT: "8001"
      CHIA_API_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  uploads:
  caddy_data:
  caddy_config:
