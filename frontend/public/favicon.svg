<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#16a34a"/>
  <!-- Chia sprout/leaf -->
  <g transform="translate(256,280)">
    <!-- Stem -->
    <path d="M0,80 Q0,-20 0,-20" stroke="white" stroke-width="24" fill="none" stroke-linecap="round"/>
    <!-- Left leaf -->
    <path d="M-4,-20 Q-90,-120 -30,-180 Q30,-140 -4,-20Z" fill="white" opacity="0.95"/>
    <!-- Right leaf -->
    <path d="M4,-40 Q90,-140 30,-200 Q-30,-160 4,-40Z" fill="white" opacity="0.85"/>
    <!-- Split line through leaves (expense splitting concept) -->
    <line x1="0" y1="-180" x2="0" y2="20" stroke="#16a34a" stroke-width="8" stroke-linecap="round" opacity="0.3"/>
  </g>
  <!-- Dollar/coin dots representing money -->
  <circle cx="140" cy="360" r="18" fill="white" opacity="0.3"/>
  <circle cx="372" cy="360" r="18" fill="white" opacity="0.3"/>
</svg>
